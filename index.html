<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Worddo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Arial Black', Arial, sans-serif; background: #ede9e3; color: #111; min-height: 100vh; }
  .nav { background: #fff; border-bottom: 1.5px solid #ccc; padding: 0 24px; display: flex; align-items: stretch; height: 50px; }
  .nav-title { font-size: 14px; font-weight: 900; cursor: pointer; letter-spacing: 2px; display: flex; align-items: center; padding-right: 24px; border-right: 1.5px solid #ddd; margin-right: 4px; color: #111; }
  .nav-btn { background: transparent; border: none; border-bottom: 2.5px solid transparent; color: #999; padding: 0 16px; cursor: pointer; font-size: 10px; font-weight: 900; letter-spacing: 2px; font-family: 'Arial Black', Arial, sans-serif; display: flex; align-items: center; height: 100%; }
  .nav-btn.active, .nav-btn:hover { color: #111; border-bottom-color: #111; }
  .nav-trash { margin-left: auto; letter-spacing: 0; border-bottom: none; color: #888; font-size: 13px; }
  .nav-trash:hover { color: #111; border-bottom-color: transparent; }
  .screen { display: none; padding: 28px 24px; max-width: 900px; margin: 0 auto; }
  .screen.active { display: block; }
  .home-hero { padding: 40px 0 32px; }
  .home-hero-tag { font-size: 9px; letter-spacing: 4px; color: #666; font-family: Arial; margin-bottom: 10px; font-weight: 400; }
  .home-hero h1 { font-size: 52px; font-weight: 900; letter-spacing: -3px; line-height: 1; margin-bottom: 8px; color: #111; }
  .home-hero p { color: #666; font-size: 12px; letter-spacing: 1px; margin-bottom: 32px; font-family: Arial; font-weight: 400; }
  .home-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; }
  .home-card { padding: 28px 24px; cursor: pointer; position: relative; border: 1.5px solid #ccc; background: #fff; transition: background 0.15s; min-height: 120px; }
  .home-card:nth-child(2) { background: #e4e0da; }
  .home-card:hover { background: #dedad3; }
  .home-card .icon { display: none; }
  .home-card h2 { font-size: 24px; font-weight: 900; letter-spacing: -1px; color: #111; margin-bottom: 4px; }
  .home-card p { font-size: 12px; color: #555; font-family: Arial; font-weight: 400; }
  .home-card-tag { font-size: 8px; letter-spacing: 3px; color: #888; font-family: Arial; margin-bottom: 14px; font-weight: 400; }
  .home-card-num { position: absolute; top: 18px; right: 18px; font-size: 26px; font-weight: 900; color: #ddd; }
  .home-card-arrow { position: absolute; bottom: 18px; right: 18px; font-size: 12px; color: #888; font-family: Arial; }
  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
  .section-header h2 { font-size: 20px; font-weight: 900; letter-spacing: -1px; }
  .back-btn { background: #fff; border: 1.5px solid #ccc; padding: 7px 16px; cursor: pointer; font-size: 9px; font-weight: 900; letter-spacing: 2px; font-family: 'Arial Black', Arial, sans-serif; color: #555; }
  .back-btn:hover { background: #e4e0da; }
  .cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 3px; }
  .card-item { background: #fff; border: 1.5px solid #ccc; padding: 20px; cursor: pointer; text-align: center; transition: background 0.15s; position: relative; }
  .card-item:hover { background: #e4e0da; }
  .card-item h3 { font-size: 13px; font-weight: 900; margin-top: 6px; color: #111; }
  .card-item p { font-size: 11px; color: #666; margin-top: 3px; font-family: Arial; font-weight: 400; }
  .card-delete-btn { position: absolute; top: 6px; right: 6px; background: transparent; border: none; font-size: 13px; cursor: pointer; opacity: 0; color: #888; padding: 2px 5px; }
  .card-item:hover .card-delete-btn { opacity: 1; }
  .add-card { background: #ede9e3; border: 1.5px dashed #bbb; padding: 20px; cursor: pointer; text-align: center; transition: all 0.15s; color: #777; font-family: Arial; font-size: 12px; }
  .add-card:hover { border-color: #555; color: #444; background: #e4e0da; }
  .quiz-step { background: #fff; border: 1.5px solid #ccc; padding: 24px; margin-bottom: 12px; }
  .quiz-step h3 { font-size: 10px; font-weight: 900; letter-spacing: 3px; margin-bottom: 16px; color: #555; font-family: Arial; }
  .option-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }
  .option-btn { background: #f5f3ef; border: 1.5px solid #ccc; padding: 12px 16px; cursor: pointer; font-size: 13px; text-align: left; transition: all 0.15s; font-family: Arial; color: #444; }
  .option-btn:hover { border-color: #555; background: #e4e0da; color: #111; }
  .option-btn.selected { border-color: #444; background: #444; color: #fff; }
  .start-quiz-btn { background: #444; color: #fff; border: none; padding: 14px 32px; font-size: 11px; font-weight: 900; letter-spacing: 2px; cursor: pointer; margin-top: 10px; font-family: 'Arial Black', Arial, sans-serif; }
  .start-quiz-btn:disabled { background: #ccc; color: #999; cursor: not-allowed; }
  .quiz-progress-bar { background: #ddd; height: 2px; margin-bottom: 24px; }
  .quiz-progress-fill { background: #555; height: 2px; transition: width 0.3s; }
  .quiz-meta { display: flex; justify-content: space-between; font-size: 10px; letter-spacing: 2px; color: #777; margin-bottom: 8px; font-family: Arial; }
  .quiz-card { background: #fff; border: 1.5px solid #ccc; padding: 40px 32px; text-align: center; margin-bottom: 16px; }
  .prompt-label { font-size: 8px; color: #777; letter-spacing: 4px; margin-bottom: 14px; font-family: Arial; font-weight: 400; }
  .prompt { font-size: 36px; font-weight: 900; letter-spacing: -1px; color: #111; }
  .quiz-input { width: 100%; padding: 13px 16px; border: 1.5px solid #ccc; font-size: 15px; outline: none; margin-bottom: 12px; font-family: Arial; color: #111; background: #fff; }
  .quiz-input:focus { border-color: #555; }
  .quiz-input.correct { border-color: #666; background: #f5f3ef; }
  .quiz-input.wrong { border-color: #bbb; background: #f5f3ef; }
  .submit-btn { background: #444; color: #fff; border: none; padding: 13px 28px; font-size: 10px; font-weight: 900; letter-spacing: 2px; cursor: pointer; font-family: 'Arial Black', Arial, sans-serif; }
  .next-btn { background: #fff; color: #111; border: 1.5px solid #ccc; padding: 13px 28px; font-size: 10px; font-weight: 900; letter-spacing: 2px; cursor: pointer; margin-left: 8px; font-family: 'Arial Black', Arial, sans-serif; }
  .next-btn:hover { background: #e4e0da; }
  .feedback { margin-top: 12px; padding: 12px 16px; font-size: 13px; font-family: Arial; border: 1.5px solid #ddd; background: #f5f3ef; }
  .feedback.correct { color: #333; border-color: #aaa; font-weight: 900; }
  .feedback.wrong { color: #555; border-color: #ccc; }
  .mc-options { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
  .mc-btn { background: #fff; border: 1.5px solid #ccc; padding: 14px 16px; cursor: pointer; font-size: 13px; text-align: left; transition: all 0.15s; font-family: Arial; color: #444; }
  .mc-btn:hover:not(:disabled) { border-color: #555; background: #e4e0da; color: #111; }
  .mc-btn.correct { border-color: #666; background: #e4e0da; color: #111; font-weight: 900; }
  .mc-btn.wrong { border-color: #ccc; background: #ede9e3; color: #aaa; }
  .mc-btn:disabled { cursor: not-allowed; }
  .result-card { background: #fff; border: 1.5px solid #ccc; padding: 48px 32px; text-align: center; }
  .result-score { font-size: 68px; font-weight: 900; color: #111; letter-spacing: -3px; line-height: 1; }
  .result-label { font-size: 13px; color: #555; margin: 12px 0 32px; font-family: Arial; font-weight: 400; letter-spacing: 1px; }
  .result-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .result-btn { padding: 12px 22px; font-size: 10px; font-weight: 900; letter-spacing: 2px; cursor: pointer; border: none; font-family: 'Arial Black', Arial, sans-serif; }
  .result-btn.primary { background: #444; color: #fff; }
  .result-btn.secondary { background: transparent; border: 1.5px solid #ccc; color: #555; }
  .result-btn.tertiary { background: #e4e0da; color: #444; }
  .study-controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .search-input { flex: 1; min-width: 160px; padding: 10px 14px; border: 1.5px solid #ccc; font-size: 13px; outline: none; font-family: Arial; background: #fff; color: #111; }
  .search-input:focus { border-color: #555; }
  .sort-select { padding: 10px 14px; border: 1.5px solid #ccc; font-size: 13px; outline: none; background: #fff; cursor: pointer; color: #111; font-family: Arial; }
  .view-toggle { display: flex; border: 1.5px solid #ccc; overflow: hidden; }
  .view-btn { padding: 8px 14px; background: #fff; border: none; cursor: pointer; font-size: 10px; font-weight: 900; letter-spacing: 2px; font-family: 'Arial Black', Arial, sans-serif; color: #888; }
  .view-btn.active { background: #444; color: #fff; }
  .reset-btn { background: #e4e0da; border: 1.5px solid #bbb; color: #555; padding: 8px 16px; cursor: pointer; font-size: 10px; font-weight: 900; letter-spacing: 1px; font-family: 'Arial Black', Arial, sans-serif; }
  .word-table { width: 100%; border-collapse: collapse; background: #fff; border: 1.5px solid #ccc; }
  .word-table th { background: #e4e0da; color: #111; padding: 12px 16px; text-align: left; font-size: 9px; letter-spacing: 3px; font-family: Arial; font-weight: 900; border-bottom: 1.5px solid #ccc; }
  .word-table td { padding: 11px 16px; border-bottom: 1px solid #eee; font-size: 13px; font-family: Arial; color: #444; vertical-align: middle; }
  .word-table td:first-child { font-family: 'Arial Black', Arial, sans-serif; font-size: 14px; color: #111; }
  .word-table tr:last-child td { border-bottom: none; }
  .word-table tr.excluded td { opacity: 0.35; text-decoration: line-through; }
  .exclude-btn { background: transparent; border: 1.5px solid #ccc; padding: 4px 10px; cursor: pointer; font-size: 10px; letter-spacing: 1px; color: #777; font-family: Arial; }
  .exclude-btn.excluded { border-color: #999; color: #555; background: #e4e0da; }
  .edit-btn { background: transparent; border: 1.5px solid #ccc; padding: 4px 10px; cursor: pointer; font-size: 10px; letter-spacing: 1px; color: #555; font-family: Arial; margin-left: 4px; }
  .edit-btn:hover { background: #e4e0da; border-color: #999; }
  .example-card { background: #fff; border: 1.5px solid #ccc; padding: 20px; margin-bottom: 8px; }
  .example-card .word { font-size: 17px; font-weight: 900; margin-bottom: 4px; color: #111; }
  .example-card .meaning { font-size: 12px; color: #555; margin-bottom: 10px; font-family: Arial; }
  .example-card .example { font-size: 13px; color: #666; line-height: 1.6; border-left: 2px solid #ccc; padding-left: 12px; font-style: italic; font-family: Arial; }
  .add-word-form { background: #fff; border: 1.5px solid #ccc; padding: 20px; margin-bottom: 12px; display: none; }
  .add-word-form.open { display: block; }
  .form-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .form-input { flex: 1; min-width: 120px; padding: 10px 14px; border: 1.5px solid #ccc; font-size: 13px; outline: none; font-family: Arial; color: #111; }
  .form-input:focus { border-color: #555; }
  .form-btn { background: #444; color: #fff; border: none; padding: 10px 18px; cursor: pointer; font-size: 10px; font-weight: 900; letter-spacing: 1px; font-family: 'Arial Black', Arial, sans-serif; }
  .form-btn.cancel { background: #e4e0da; color: #555; }
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.35); z-index: 100; justify-content: center; align-items: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border: 1.5px solid #ccc; padding: 28px; width: 400px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
  .modal h3 { font-size: 16px; font-weight: 900; margin-bottom: 16px; color: #111; }
  .modal input { width: 100%; padding: 12px 14px; border: 1.5px solid #ccc; font-size: 14px; outline: none; margin-bottom: 16px; font-family: Arial; color: #111; }
  .modal input:focus { border-color: #555; }
  .modal-btns { display: flex; gap: 8px; }
  .modal-btn { flex: 1; padding: 12px; font-size: 10px; font-weight: 900; letter-spacing: 2px; cursor: pointer; border: none; font-family: 'Arial Black', Arial, sans-serif; }
  .modal-btn.confirm { background: #444; color: #fff; }
  .modal-btn.cancel { background: #e4e0da; color: #555; }
  .rec-set { background: #f5f3ef; border: 1.5px solid #ddd; padding: 14px 18px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .rec-set-info h4 { font-size: 13px; font-weight: 900; color: #111; }
  .rec-set-info p { font-size: 11px; color: #666; margin-top: 2px; font-family: Arial; }
  .rec-use-btn { background: #444; color: #fff; border: none; padding: 7px 14px; cursor: pointer; font-size: 10px; font-weight: 900; letter-spacing: 1px; font-family: 'Arial Black', Arial, sans-serif; white-space: nowrap; }
  .trash-item { background: #fff; border: 1.5px solid #ccc; padding: 14px 18px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .trash-item-info { display: flex; align-items: center; gap: 10px; }
  .trash-item-name { font-size: 14px; font-weight: 900; color: #111; }
  .trash-item-meta { font-size: 11px; color: #777; font-family: Arial; }
  .trash-actions { display: flex; gap: 6px; }
  .restore-btn { background: #e4e0da; border: 1.5px solid #bbb; color: #444; padding: 5px 12px; cursor: pointer; font-size: 10px; font-weight: 900; letter-spacing: 1px; font-family: 'Arial Black', Arial, sans-serif; }
  .perm-delete-btn { background: transparent; border: 1.5px solid #ccc; color: #888; padding: 5px 12px; cursor: pointer; font-size: 10px; font-weight: 900; letter-spacing: 1px; font-family: 'Arial Black', Arial, sans-serif; }
  .empty-trash-btn { background: #444; color: #fff; border: none; padding: 8px 18px; cursor: pointer; font-size: 10px; font-weight: 900; letter-spacing: 1px; font-family: 'Arial Black', Arial, sans-serif; }
  .badge { display: inline-block; padding: 2px 8px; font-size: 10px; font-weight: 900; font-family: Arial; letter-spacing: 1px; margin-left: 4px; }
  .badge-green { background: #e4e0da; color: #444; }
  .badge-yellow { background: #dedad3; color: #444; }
  .badge-red { background: #ccc; color: #444; }
</style>
</head>
<body>

<div class="nav">
  <span class="nav-title" onclick="goHome()">WORDDO</span>
  <button class="nav-btn" id="nav-home" onclick="goHome()">홈</button>
  <button class="nav-btn" id="nav-quiz" onclick="showScreen('quiz-select')">퀴즈</button>
  <button class="nav-btn" id="nav-study" onclick="showScreen('study')">학습</button>
  <button class="nav-btn nav-trash" id="nav-trash" onclick="showScreen('trash')">🗑️ 휴지통</button>
</div>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="home-hero">
    <div class="home-hero-tag">VOCABULARY APP</div>
    <h1>WORDDO</h1>
    <p>나만의 단어장 · 퀴즈로 실력 확인</p>
    <div class="home-cards">
      <div class="home-card" onclick="showScreen('quiz-select')">
        <div class="icon"></div>
        <div class="home-card-tag">MODE 01</div>
        <h2>QUIZ</h2>
        <p>단어 퀴즈로 실력 테스트</p>
        <div class="home-card-num">01</div>
        <div class="home-card-arrow">→</div>
      </div>
      <div class="home-card" onclick="showScreen('study')">
        <div class="icon"></div>
        <div class="home-card-tag">MODE 02</div>
        <h2>STUDY</h2>
        <p>단어장 & 예문 보기</p>
        <div class="home-card-num">02</div>
        <div class="home-card-arrow">→</div>
      </div>
    </div>
  </div>
</div>

<!-- QUIZ SELECT -->
<div class="screen" id="screen-quiz-select">
  <div class="section-header">
    <button class="back-btn" onclick="goHome()">← 홈</button>
    <h2>퀴즈 설정</h2>
  </div>
  <div class="quiz-step">
    <h3>① 퀴즈 방식</h3>
    <div class="option-grid">
      <button class="option-btn" id="mode-en-ko" onclick="selectMode('en-ko')">🇺🇸 영단어 → 뜻 쓰기</button>
      <button class="option-btn" id="mode-ko-en" onclick="selectMode('ko-en')">🇰🇷 한국어 → 영단어 쓰기</button>
      <button class="option-btn" id="mode-mc" onclick="selectMode('mc')">📋 객관식 (4지선다)</button>
    </div>
  </div>
  <div class="quiz-step">
    <h3>② 단어장 선택</h3>
    <div class="option-grid" id="quiz-unit-options"></div>
  </div>
  <button class="start-quiz-btn" id="start-quiz-btn" onclick="startQuiz()" disabled>퀴즈 시작!</button>
</div>

<!-- QUIZ GAME -->
<div class="screen" id="screen-quiz-game">
  <div class="section-header">
    <button class="back-btn" onclick="showScreen('quiz-select')">← 설정</button>
    <h2 id="game-title">퀴즈</h2>
  </div>
  <div class="quiz-meta">
    <span id="quiz-counter">1 / 20</span>
    <span id="quiz-score-display">점수: 0</span>
  </div>
  <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-progress" style="width:0%"></div></div>
  <div class="quiz-card">
    <div class="prompt-label" id="prompt-label">영어</div>
    <div class="prompt" id="quiz-prompt">word</div>
  </div>
  <div id="input-area">
    <input class="quiz-input" id="quiz-input" type="text" placeholder="답을 입력하세요..." onkeydown="if(event.key==='Enter')checkAnswer()">
    <button class="submit-btn" id="submit-btn" onclick="checkAnswer()">확인</button>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()" style="display:none">다음 →</button>
    <div class="feedback" id="feedback" style="display:none"></div>
  </div>
  <div id="mc-area" style="display:none">
    <div class="mc-options" id="mc-options"></div>
    <button class="next-btn" id="mc-next-btn" onclick="nextQuestion()" style="display:none;margin-top:14px">다음 →</button>
  </div>
</div>

<!-- QUIZ RESULT -->
<div class="screen" id="screen-quiz-result">
  <div class="result-card">
    <div class="result-score" id="result-score">0/0</div>
    <div class="result-label" id="result-label">수고했어!</div>
    <div class="result-btns">
      <button class="result-btn primary" onclick="restartQuiz()">🔄 다시하기</button>
      <button class="result-btn secondary" id="retry-wrong-btn" onclick="retryWrong()">❌ 틀린 문제만</button>
      <button class="result-btn tertiary" onclick="goHome()">🏠 끝내기</button>
    </div>
  </div>
</div>

<!-- STUDY - FOLDER VIEW -->
<div class="screen" id="screen-study">
  <div class="section-header">
    <button class="back-btn" id="study-back-btn" onclick="goHome()">← 홈</button>
    <h2 id="study-title">학습</h2>
  </div>
  <div id="study-folder-view"></div>
</div>

<!-- STUDY - WORD VIEW -->
<div class="screen" id="screen-study-words">
  <div class="section-header">
    <button class="back-btn" onclick="studyBackToFolder()">← 뒤로</button>
    <h2 id="study-words-title">단어장</h2>
  </div>
  <div class="study-controls">
    <input class="search-input" id="search-input" type="text" placeholder="🔍 단어 검색..." oninput="renderStudy()">
    <select class="sort-select" id="sort-select" onchange="renderStudy()">
      <option value="default">기본순</option>
      <option value="abc">ABC순</option>
      <option value="ko">가나다순</option>
    </select>
    <div class="view-toggle">
      <button class="view-btn active" id="view-words-btn" onclick="setView('words')">단어장</button>
      <button class="view-btn" id="view-examples-btn" onclick="setView('examples')">예문</button>
    </div>
    <button class="reset-btn" onclick="resetExclusions()">↺ 제외 초기화</button>
  </div>
  <div class="add-word-form" id="add-word-form">
    <div class="form-row">
      <input class="form-input" id="new-word-en" placeholder="영단어">
      <input class="form-input" id="new-word-ko" placeholder="한국어 뜻">
      <input class="form-input" id="new-word-ex" placeholder="예문 (선택)">
      <button class="form-btn" onclick="addCustomWord()">추가</button>
      <button class="form-btn cancel" onclick="toggleAddForm()">취소</button>
    </div>
  </div>
  <div id="study-content"></div>
</div>

<!-- TRASH -->
<div class="screen" id="screen-trash">
  <div class="section-header">
    <button class="back-btn" onclick="goHome()">← 홈</button>
    <h2>🗑️ 휴지통</h2>
    <button class="empty-trash-btn" onclick="emptyTrash()" style="margin-left:auto">전체 삭제</button>
  </div>
  <div id="trash-content"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 id="modal-title">이름 입력</h3>
    <input id="modal-input" type="text" placeholder="이름...">
    <div id="modal-rec-sets" style="display:none;margin-bottom:16px"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn confirm" id="modal-confirm-btn" onclick="confirmModal()">확인</button>

function getFolders() {
  return JSON.parse(localStorage.getItem('wb_folders') || '[]');
}
function saveFolders(f) { localStorage.setItem('wb_folders', JSON.stringify(f)); }

function getCustomWords() {
  return JSON.parse(localStorage.getItem('wb_words') || '[]');
}
function saveCustomWords(w) { localStorage.setItem('wb_words', JSON.stringify(w)); }

function getExcluded() {
  return JSON.parse(localStorage.getItem('wb_excluded') || '[]');
}
function saveExcluded(e) { localStorage.setItem('wb_excluded', JSON.stringify(e)); }

function getTrash() {
  return JSON.parse(localStorage.getItem('wb_trash') || '[]');
}
function saveTrash(t) { localStorage.setItem('wb_trash', JSON.stringify(t)); }

function allWordsForUnit(unitId) {
  const rec = Object.values(RECOMMENDED_SETS).find(s => s.name === unitId || unitId === s.name);
  const recWords = rec ? rec.words.map(w => ({...w, unit: unitId})) : [];
  const custom = getCustomWords().filter(w => w.unit === unitId);
  if (custom.length > 0) return custom;
  return rec ? rec.words.map(w => ({...w, unit: unitId})) : [];
}

function allActiveWords(unitId) {
  const exc = getExcluded();
  return allWordsForUnit(unitId).filter(w => !exc.includes(unitId + ':' + w.en));
}

function showScreen(name) {
  const map = {
    'home':'screen-home','quiz-select':'screen-quiz-select',
    'quiz-game':'screen-quiz-game','quiz-result':'screen-quiz-result',
    'study':'screen-study','study-words':'screen-study-words','trash':'screen-trash',
  };
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(map[name]).classList.add('active');
  state.currentScreen = name;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (name==='home') document.getElementById('nav-home').classList.add('active');
  if (name.startsWith('quiz')) document.getElementById('nav-quiz').classList.add('active');
  if (name.startsWith('study')) { document.getElementById('nav-study').classList.add('active'); if(name==='study') renderFolderView(); }
  if (name==='trash') { document.getElementById('nav-trash').classList.add('active'); renderTrash(); }
  if (name==='quiz-select') renderQuizUnits();
}
function goHome() { (function() {
  const f = JSON.parse(localStorage.getItem('wb_folders') || '[]');
  const c = f.filter(x => x.name && x.name.trim() !== '');
  if (c.length !== f.length) localStorage.setItem('wb_folders', JSON.stringify(c));
})();
(function() {
  const f = JSON.parse(localStorage.getItem('wb_folders') || '[]');
  const c = f.filter(x => x.name && x.name.trim() !== '');
  if (c.length !== f.length) localStorage.setItem('wb_folders', JSON.stringify(c));
})();
showScreen('home'); }

function renderFolderView() {
  const folders = getFolders();
  const currentId = state.currentFolder;
  const items = folders.filter(f => f.parentId === currentId);

  if (currentId === null) {
    document.getElementById('study-title').textContent = '학습';
    document.getElementById('study-back-btn').textContent = '← 홈';
    document.getElementById('study-back-btn').onclick = () => goHome();
  } else {
    const cur = folders.find(f => f.id === currentId);
    document.getElementById('study-title').textContent = cur?.name || '학습';
    document.getElementById('study-back-btn').textContent = '← 뒤로';
    document.getElementById('study-back-btn').onclick = () => studyGoBack();
  }

  let html = '<div class="cards-grid">';
  items.forEach(item => {
    const count = item.type === 'folder'
      ? folders.filter(f => f.parentId === item.id).length
      : allWordsForUnit(item.name).length;
    const icon = item.type === 'folder' ? '📁' : '📄';
    const sub = item.type === 'folder' ? `${count}개 항목` : `${count}개 단어`;
    html += `<div class="card-item" onclick="${item.type==='folder' ? `openFolder('${item.id}')` : `openWordList('${item.id}','${item.name.replace(/'/g,"\\'")}')`}">
      <div style="font-size:28px">${icon}</div>
      <h3>${item.name}</h3><p>${sub}</p>
      <button class="card-delete-btn" onclick="event.stopPropagation();moveToTrash('${item.id}')">🗑️</button>
    </div>`;
  });
  html += `<div class="add-card" onclick="addFolder()">📁<br><span style="font-size:12px">폴더 추가</span></div>
    <div class="add-card" onclick="addFile()">📄<br><span style="font-size:12px">파일 추가</span></div></div>`;
  document.getElementById('study-folder-view').innerHTML = html;
}

function openFolder(id) { state.currentFolder = id; renderFolderView(); }

function studyGoBack() {
  const folders = getFolders();
  const cur = folders.find(f => f.id === state.currentFolder);
  state.currentFolder = cur?.parentId || null;
  showScreen('study');
}
function studyBackToFolder() { showScreen('study'); }

function openWordList(id, name) {
  state.studyUnit = name;
  state.studyView = 'words';
  document.getElementById('study-words-title').textContent = name;
  document.getElementById('view-words-btn').classList.add('active');
  document.getElementById('view-examples-btn').classList.remove('active');
  document.getElementById('search-input').value = '';
  document.getElementById('add-word-form').classList.remove('open');
  showScreen('study-words');
  renderStudy();
}

function addFolder() {
  openModal('folder', '폴더 이름', null, (name) => {
    const folders = getFolders();
    folders.push({ id: 'f_'+Date.now(), name, type:'folder', parentId: state.currentFolder });
    saveFolders(folders);
    renderFolderView();
  });
}

function addFile() {
  openModal('file', '파일(단어장) 이름', null, (name, recKey) => {
    if (!name) return;
    const folders = getFolders();
    const id = 'p_'+Date.now();
    folders.push({ id, name, type:'file', parentId: state.currentFolder });
    saveFolders(folders);
    // 추천 세트 단어 복사
    if (recKey && RECOMMENDED_SETS[recKey]) {
      const words = getCustomWords();
      RECOMMENDED_SETS[recKey].words.forEach(w => {
        words.push({...w, unit: name});
      });
      saveCustomWords(words);
    }
    renderFolderView();
  });
}

// ========================
// TRASH
// ========================
function moveToTrash(id) {
  if (!confirm('휴지통으로 이동할까요?')) return;
  const folders = getFolders();
  const item = folders.find(f => f.id === id);
  if (!item) return;
  const toTrash = [item];
  const getChildren = pid => folders.filter(f => f.parentId===pid).forEach(c => { toTrash.push(c); if(c.type==='folder') getChildren(c.id); });
  if (item.type==='folder') getChildren(id);
  const trash = getTrash();
  toTrash.forEach(t => trash.push({...t, deletedAt: new Date().toLocaleDateString('ko-KR')}));
  saveTrash(trash);
  saveFolders(folders.filter(f => !toTrash.map(t=>t.id).includes(f.id)));
  renderFolderView();
}

function renderTrash() {
  const trash = getTrash();
  const c = document.getElementById('trash-content');
  if (!trash.length) { c.innerHTML='<p style="color:#666;text-align:center;padding:60px;font-family:Arial;font-size:13px">🗑️ 휴지통이 비어있어요!</p>'; return; }
  c.innerHTML = trash.map((item,i) => `
    <div class="trash-item">
      <div class="trash-item-info">
        <span style="font-size:24px">${item.type==='folder'?'📁':'📄'}</span>
        <div><div class="trash-item-name">${item.name}</div><div class="trash-item-meta">삭제일: ${item.deletedAt}</div></div>
      </div>
      <div class="trash-actions">
        <button class="restore-btn" onclick="restoreFromTrash(${i})">↩ 복원</button>
        <button class="perm-delete-btn" onclick="permanentDelete(${i})">완전 삭제</button>
      </div>
    </div>`).join('');
}

function restoreFromTrash(i) {
  const trash = getTrash(); const folders = getFolders();
  const item = trash[i];
  if (!folders.find(f => f.id === item.parentId)) item.parentId = null;
  folders.push(item); saveFolders(folders);
  trash.splice(i,1); saveTrash(trash); renderTrash();
}
function permanentDelete(i) {
  if (!confirm('완전히 삭제할까요?')) return;
  const trash = getTrash(); trash.splice(i,1); saveTrash(trash); renderTrash();
}
function emptyTrash() {
  if (!confirm('휴지통을 비울까요?')) return;
  saveTrash([]); renderTrash();
}

// ========================
// STUDY - WORD VIEW
// ========================
function setView(v) {
  state.studyView = v;
  document.getElementById('view-words-btn').classList.toggle('active', v==='words');
  document.getElementById('view-examples-btn').classList.toggle('active', v==='examples');
  renderStudy();
}
function toggleAddForm() { document.getElementById('add-word-form').classList.toggle('open'); }

function addCustomWord() {
  const en = document.getElementById('new-word-en').value.trim();
  const ko = document.getElementById('new-word-ko').value.trim();
  const ex = document.getElementById('new-word-ex').value.trim();
  if (!en||!ko) { alert('영단어와 뜻을 입력해주세요!'); return; }
  const words = getCustomWords();
  words.push({en, ko, unit: state.studyUnit, ex: ex||''});
  saveCustomWords(words);
  document.getElementById('new-word-en').value='';
  document.getElementById('new-word-ko').value='';
  document.getElementById('new-word-ex').value='';
  document.getElementById('add-word-form').classList.remove('open');
  renderStudy();
}

function renderStudy() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const sort = document.getElementById('sort-select').value;
  const exc = getExcluded();
  let words = allWordsForUnit(state.studyUnit);
  if (search) words = words.filter(w => w.en.toLowerCase().includes(search) || w.ko.includes(search));
  if (sort==='abc') words = [...words].sort((a,b) => a.en.localeCompare(b.en));
  else if (sort==='ko') words = [...words].sort((a,b) => a.ko.localeCompare(b.ko));

  const key = w => state.studyUnit+':'+w.en;
  const addBtn = `<button onclick="toggleAddForm()" class="form-btn" style="margin-bottom:12px">+ 단어 추가</button>`;

  if (state.studyView==='words') {
    document.getElementById('study-content').innerHTML = addBtn + `
      <table class="word-table"><thead><tr><th>영단어</th><th>뜻</th><th>제외 / 수정</th></tr></thead><tbody>
      ${words.map(w => `<tr class="${exc.includes(key(w))?'excluded':''}">
        <td>${w.en}</td><td>${w.ko}</td>
        <td><button class="exclude-btn ${exc.includes(key(w))?'excluded':''}" onclick="toggleExclude('${state.studyUnit}','${w.en.replace(/'/g,"\\'")}')">
          ${exc.includes(key(w))?'복원':'제외'}</button><button class="edit-btn" onclick="editWord('${state.studyUnit}','${w.en}')">수정</button></td>
      </tr>`).join('')}
      </tbody></table>`;
  } else {
    document.getElementById('study-content').innerHTML = addBtn + (words.map(w => `
      <div class="example-card ${exc.includes(key(w))?'excluded':''}">
        <div class="word">${w.en}</div><div class="meaning">${w.ko}</div>
        ${w.ex?`<div class="example">"${w.ex}"</div>`:''}
      </div>`).join('') || '<p style="color:#666;text-align:center;padding:40px;font-family:Arial;font-size:13px">단어가 없어요!</p>');
  }
}

function toggleExclude(unit, en) {
  const exc = getExcluded(); const key = unit+':'+en;
  if (exc.includes(key)) saveExcluded(exc.filter(e=>e!==key));
  else { exc.push(key); saveExcluded(exc); }
  renderStudy();
}

function editWord(unit, oldEn) {
  const customWords = getCustomWords();
  const idx = customWords.findIndex(w => w.unit === unit && w.en === oldEn);
  const allWords = allWordsForUnit(unit);
  const wordData = allWords.find(w => w.en === oldEn) || {en: oldEn, ko: '', ex: ''};
  const newEn = prompt('영단어 수정:', wordData.en);
  if (newEn === null || !newEn.trim()) return;
  const newKo = prompt('뜻 수정:', wordData.ko);
  if (newKo === null || !newKo.trim()) return;
  const newEx = prompt('예문 수정 (없으면 빈칸):', wordData.ex || '');
  if (newEx === null) return;
  if (idx !== -1) {
    customWords[idx] = {...customWords[idx], en: newEn.trim(), ko: newKo.trim(), ex: newEx.trim()};
  } else {
    customWords.push({en: newEn.trim(), ko: newKo.trim(), ex: newEx.trim(), unit});
  }
  saveCustomWords(customWords);
  renderStudy();
}

function resetExclusions() {
  if (!confirm('제외된 단어를 복원할까요?')) return;
  const exc = getExcluded();
  saveExcluded(exc.filter(e => !e.startsWith(state.studyUnit+':')));
  renderStudy();
}

// ========================
// QUIZ
// ========================
function renderQuizUnits() {
  const folders = getFolders();
  const files = folders.filter(f => f.type==='file');
  const c = document.getElementById('quiz-unit-options');
  if (!files.length) { c.innerHTML='<p style="color:#666;font-family:Arial;font-size:13px;padding:16px 0">학습에서 단어장을 먼저 만들어줘!</p>'; return; }
  c.innerHTML = files.map(f => `
    <button class="option-btn" id="unit-${f.id}" onclick="selectUnit('${f.id}','${f.name.replace(/'/g,"\\'")}')">
      📄 ${f.name} <span style="font-size:11px;opacity:0.6">(${allActiveWords(f.name).length}개)</span>
    </button>`).join('');
}

function selectMode(mode) {
  state.quizMode = mode;
  document.querySelectorAll('[id^="mode-"]').forEach(b=>b.classList.remove('selected'));
  document.getElementById('mode-'+mode).classList.add('selected');
  updateStartBtn();
}
function selectUnit(id, name) {
  state.quizUnit = name;
  document.querySelectorAll('[id^="unit-"]').forEach(b=>b.classList.remove('selected'));
  document.getElementById('unit-'+id).classList.add('selected');
  updateStartBtn();
}
function updateStartBtn() {
  document.getElementById('start-quiz-btn').disabled = !(state.quizMode && state.quizUnit);
}

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startQuiz(words=null) {
  const pool = words || allActiveWords(state.quizUnit);
  if (pool.length<4) { alert('단어가 너무 적어요! (최소 4개)'); return; }
  state.quizWords = shuffle(pool);
  state.quizIndex = 0; state.quizScore = 0; state.quizWrong = [];
  showScreen('quiz-game');
  renderQuestion();
}

function renderQuestion() {
  const w = state.quizWords[state.quizIndex];
  const total = state.quizWords.length;
  document.getElementById('quiz-counter').textContent = `${state.quizIndex+1} / ${total}`;
  document.getElementById('quiz-score-display').textContent = `점수: ${state.quizScore}`;
  document.getElementById('quiz-progress').style.width = (state.quizIndex/total*100)+'%';

  const isMC = state.quizMode==='mc';
  document.getElementById('input-area').style.display = isMC?'none':'block';
  document.getElementById('mc-area').style.display = isMC?'block':'none';

  if (state.quizMode==='en-ko') {
    document.getElementById('prompt-label').textContent='영어 → 한국어';
    document.getElementById('quiz-prompt').textContent=w.en;
  } else if (state.quizMode==='ko-en') {
    document.getElementById('prompt-label').textContent='한국어 → 영어';
    document.getElementById('quiz-prompt').textContent=w.ko;
  } else {
    const isEnKo = Math.random()>0.5;
    w._mcEnKo = isEnKo;
    document.getElementById('prompt-label').textContent=isEnKo?'영어 → 한국어':'한국어 → 영어';
    document.getElementById('quiz-prompt').textContent=isEnKo?w.en:w.ko;
  }

  if (!isMC) {
    const inp = document.getElementById('quiz-input');
    inp.value=''; inp.className='quiz-input'; inp.disabled=false; inp.focus();
    document.getElementById('submit-btn').style.display='inline-block';
    document.getElementById('next-btn').style.display='none';
    document.getElementById('feedback').style.display='none';
  } else renderMC(w);
}

function checkAnswer() {
  const w = state.quizWords[state.quizIndex];
  const inp = document.getElementById('quiz-input');
  const ans = inp.value.trim().toLowerCase();
  const correctRaw = state.quizMode==='en-ko' ? w.ko : w.en;
  // 관용적 정답 처리: 콤마/슬래시로 구분, 앞뒤 공백 제거, 소문자 비교
  const correctAlts = correctRaw.toLowerCase().split(/[,\/]/).map(s=>s.trim()).filter(Boolean);
  const isCorrect = correctAlts.some(alt => ans===alt || ans===alt.replace(/\(.*?\)/g,'').trim());

  inp.disabled=true;
  document.getElementById('submit-btn').style.display='none';
  document.getElementById('next-btn').style.display='inline-block';
  const fb = document.getElementById('feedback');
  fb.style.display='block';
  if (isCorrect) {
    inp.classList.add('correct');
    fb.className='feedback correct'; fb.textContent='✅ 정답!';
    state.quizScore++;
  } else {
    inp.classList.add('wrong');
    fb.className='feedback wrong';
    fb.textContent=`❌ 오답! 정답: ${correctRaw}`;
    state.quizWrong.push(w);
  }
}

function renderMC(w) {
  const allW = allActiveWords(state.quizUnit);
  const isEnKo = w._mcEnKo !== undefined ? w._mcEnKo : Math.random()>0.5;
  w._mcEnKo = isEnKo;
  const pool = shuffle(allW.filter(x=>x.en!==w.en)).slice(0,3);
  const options = shuffle([w,...pool]);
  const c = document.getElementById('mc-options');
  c.innerHTML='';
  options.forEach(opt => {
    const btn=document.createElement('button');
    btn.className='mc-btn';
    btn.textContent=isEnKo?opt.ko:opt.en;
    btn.onclick=()=>checkMC(btn,opt,w,isEnKo);
    c.appendChild(btn);
  });
  document.getElementById('mc-next-btn').style.display='none';
}

function checkMC(btn,selected,correct,isEnKo) {
  document.querySelectorAll('.mc-btn').forEach(b=>b.disabled=true);
  const isCorrect=selected.en===correct.en;
  if (isCorrect) { btn.classList.add('correct'); state.quizScore++; }
  else {
    btn.classList.add('wrong');
    document.querySelectorAll('.mc-btn').forEach(b=>{
      if(b.textContent===(isEnKo?correct.ko:correct.en)) b.classList.add('correct');
    });
    state.quizWrong.push(correct);
  }
  document.getElementById('mc-next-btn').style.display='inline-block';
}

function nextQuestion() {
  state.quizIndex++;
  if (state.quizIndex>=state.quizWords.length) showResult();
  else renderQuestion();
}

function showResult() {
  showScreen('quiz-result');
  const total=state.quizWords.length, score=state.quizScore;
  document.getElementById('result-score').textContent=`${score}/${total}`;
  const pct=score/total;
  document.getElementById('result-label').textContent = pct>=0.9?'완벽 — 대단해':pct>=0.7?'잘했어 — 조금만 더':pct>=0.5?'절반 — 한번 더 해봐':'처음부터 다시 해보자';
  document.getElementById('retry-wrong-btn').disabled=state.quizWrong.length===0;
}
function restartQuiz() { showScreen('quiz-select'); }
function retryWrong() { if(state.quizWrong.length) startQuiz(state.quizWrong); }

// ========================
// MODAL
// ========================
function openModal(type, title, hint, callback) {
  state.modalCallback = callback;
  state.modalType = type;
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-input').value = '';
  document.getElementById('modal-input').placeholder = hint || '이름 입력...';

  const recDiv = document.getElementById('modal-rec-sets');

  if (type === 'folder') {
    recDiv.style.display = 'block';
    const REC_FOLDERS = [
      { key:'beginner', name:'초급', badge:'badge-green', desc:'초급 1·2·3 (총 150개 단어)', files:['beginner1','beginner2','beginner3'] },
      { key:'intermediate', name:'중급', badge:'badge-yellow', desc:'중급 1·2·3 (총 150개 단어)', files:['intermediate1','intermediate2','intermediate3'] },
      { key:'advanced', name:'상급', badge:'badge-red', desc:'상급 1·2·3 (총 150개 단어)', files:['advanced1','advanced2','advanced3'] },
    ];
    const usedN = getFolders().map(f => f.name);
    const avRec = REC_FOLDERS.filter(rf => !usedN.includes(rf.name));
    recDiv.innerHTML = avRec.length === 0
      ? '<p style="font-size:12px;color:#aaa;">모든 추천 세트를 이미 사용 중이에요.</p>'
      : '<p style="font-size:11px;color:#666;margin-bottom:8px;font-family:Arial;">추천 세트로 시작</p>' +
        avRec.map(rf => `<div class="rec-set"><div class="rec-set-info"><h4>${rf.name} <span class="badge ${rf.badge}">${rf.name}</span></h4><p>${rf.desc}</p></div><button class="rec-use-btn" onclick="useRecommendedFolder('${rf.key}')">사용</button></div>`).join('');
  } else if (type === 'file') {
    recDiv.style.display = 'block';
    const usedFN = getFolders().filter(f => f.type==='file').map(f => f.name);
    const avSets = Object.entries(RECOMMENDED_SETS).filter(([k, s]) => !usedFN.includes(s.name));
    recDiv.innerHTML = avSets.length === 0
      ? '<p style="font-size:12px;color:#aaa;">모든 추천 단어장을 이미 사용 중이에요.</p>'
      : '<p style="font-size:11px;color:#666;margin-bottom:8px;font-family:Arial;">추천 세트로 시작</p>' +
        avSets.map(([k, s]) => `<div class="rec-set"><div class="rec-set-info"><h4>${s.name} <span class="badge ${s.badge}">${s.level}</span></h4><p>${s.words.length}개 단어</p></div><button class="rec-use-btn" onclick="useRecommended('${k}')">사용</button></div>`).join('');
  } else {
    recDiv.style.display = 'none';
  }

  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('modal-input').focus(),100);
}

function useRecommendedFolder(key) {
  const MAP = {
    beginner: { name:'초급', files:['beginner1','beginner2','beginner3'] },
    intermediate: { name:'중급', files:['intermediate1','intermediate2','intermediate3'] },
    advanced: { name:'상급', files:['advanced1','advanced2','advanced3'] },
  };
  const rf = MAP[key];
  closeModal();
  const folders = getFolders();
  const folderId = 'f_'+Date.now();
  folders.push({ id: folderId, name: rf.name, type:'folder', parentId: state.currentFolder });
  const words = getCustomWords();
  rf.files.forEach((fk, i) => {
    const s = RECOMMENDED_SETS[fk];
    if (!s) return;
    const fileId = 'p_'+(Date.now()+i);
    folders.push({ id: fileId, name: s.name, type:'file', parentId: folderId });
    s.words.forEach(w => words.push({...w, unit: s.name}));
  });
  saveFolders(folders);
  saveCustomWords(words);
  renderFolderView();
}

function useRecommended(key) {
  const s = RECOMMENDED_SETS[key];
  document.getElementById('modal-input').value = s.name;
  closeModal();
  // 바로 파일 생성
  const folders = getFolders();
  const id = 'p_'+Date.now();
  const name = s.name;
  folders.push({ id, name, type:'file', parentId: state.currentFolder });
  saveFolders(folders);
  const words = getCustomWords();
  s.words.forEach(w => words.push({...w, unit: name}));
  saveCustomWords(words);
  renderFolderView();
}

function closeModal() { document.getElementById('modal').classList.remove('open'); state.modalCallback=null; }

function confirmModal() {
  const val = document.getElementById('modal-input').value.trim();
  if (!val) return;
  if (state.modalCallback) state.modalCallback(val, null);
  closeModal();
}

document.getElementById('modal-input').addEventListener('keydown', e => {
  if (e.key==='Enter') confirmModal();
  if (e.key==='Escape') closeModal();
});

showScreen('home');
</script>
